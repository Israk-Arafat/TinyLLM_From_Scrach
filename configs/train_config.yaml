training:
  seed: 42
  max_steps: 25000
  warmup_steps: 500
  batch_size: 64 # per-step batch; effective = batch_size × grad_accum = 128
  gradient_accumulation_steps: 2 # 64×2=128 — only 2 data fetches per opt step vs 32 original
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  log_interval: 10 # log train loss every N optimizer steps
  eval_interval: 500
  max_val_batches: 100
  save_interval: 2000
  checkpoint_dir: checkpoints/
  log_dir: logs/
  use_amp: true # bfloat16 autocast — ~2× faster on A100, no loss scaling needed
  compile: false # set to true after first run to use cached compiled kernels
  use_wandb: false
  wandb_project: tinyllm
