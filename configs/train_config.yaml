training:
  seed: 42
  max_steps: 100000
  warmup_steps: 2000
  batch_size: 32
  gradient_accumulation_steps: 4
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  eval_interval: 500
  save_interval: 2000
  checkpoint_dir: checkpoints/
  log_dir: logs/
  use_wandb: false
  wandb_project: tinyllm
