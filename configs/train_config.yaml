training:
  seed: 42
  max_steps: 25000
  warmup_steps: 500
  batch_size: 48 # per-step batch; effective = batch_size × grad_accum = 144
  gradient_accumulation_steps: 3 # 48×3=144 — lower peak VRAM per forward pass, similar effective batch
  learning_rate: 3.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0
  log_interval: 10 # log train loss every N optimizer steps
  eval_interval: 500
  max_val_batches: 100
  save_interval: 300 # save every ~42 min (~30s overhead per save to Drive)
  checkpoint_dir: checkpoints/
  log_dir: logs/
  use_amp: true # bfloat16 autocast — ~2× faster on A100, no loss scaling needed
  gradient_checkpointing: true # recompute activations during backward; ~40% less VRAM, ~20% slower
  compile: false # set to true after first run to use cached compiled kernels
  use_wandb: false
  wandb_project: tinyllm
